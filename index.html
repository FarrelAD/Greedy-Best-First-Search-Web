<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Greedy Best First Search Demo</title>
    <link rel="shortcut icon" href="assets/favicon.ico" type="image/x-icon">
    <link href="https://cdn.jsdelivr.net/npm/daisyui@5" rel="stylesheet" type="text/css" />
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <style>
        input[type="number"]::-webkit-outer-spin-button,
        input[type="number"]::-webkit-inner-spin-button {
          -webkit-appearance: none;
          margin: 0;
        }
    
        input[type="number"] {
          -moz-appearance: textfield;
        }
    </style>
    <script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3.14.8/dist/cdn.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/d3@7"></script>
</head>

<body class="py-5 px-12 min-h-screen">
    <nav class="navbar fixed top-0">
        <div class="navbar-start">
            <h1 class="text-2xl font-bold">Greedy Best First Search Demo</h1>
        </div>
    </nav>

    <main 
        x-ref="main"
        x-data="mainComponent"
        class="mt-14 relative p-12 pb-20 h-screen min-h-screen">
        <section class="fixed z-10 top-1/2 -translate-y-1/2 left-5">
            <div
                x-data="controllerComponent"
                class="card card-md card-border bg-white shadow-lg h-[30rem] w-96">
                <div class="card-body">
                    <div class="card-title font-bold">Controller</div>

                    <div class="tabs tabs-border">
                        <input type="radio" name="tab-nav" class="tab mb-4" aria-label="Input" checked="checked"/>
                        <div class="tab-content">
                            <label class="floating-label">
                                <input 
                                    x-init="$store.nodes.updateNode($el.value)"
                                    @input="$store.nodes.updateNode($el.value)"
                                    type="number" 
                                    class="input input-neutral input-sm validator" 
                                    required 
                                    placeholder="Total node" 
                                    min="2" 
                                    value="2"
                                    title="Total node">
                                <p class="validator-hint text-xs">The minimum of total node is 2</p>
                                <span>Total node</span>
                            </label>
    
                            <div class="overflow-y-auto max-h-52">
                                <table
                                    class="table table-zebra">
                                    <thead class="sticky top-0 bg-white z-10">
                                        <tr>
                                            <th>No</th>
                                            <th>Node</th>
                                        </tr>
                                    </thead>
                                    <tbody>
                                        <template x-for="(val, index) in $store.nodes.nodes" :key="index">
                                            <tr>
                                                <td x-text="index + 1"></td>
                                                <td>
                                                    <input 
                                                        @input="$store.nodes.updateNodeProperty(index, $el.value)"
                                                        type="text" 
                                                        class="input input-ghost focus:outline-none focus:border-none focus:ring-0 focus:bg-transparent" 
                                                        placeholder="Name">
                                                </td>
                                            </tr>
                                        </template>
                                    </tbody>
                                </table>
                            </div>
                        </div>
                    
                        <input type="radio" name="tab-nav" class="tab mb-4" aria-label="Paths"/>
                        <div class="tab-content">
                            <div
                                x-data="pathTableComponent" 
                                class="overflow-y-auto max-h-52">
                                <table class="table table-zebra">
                                    <thead class="sticky top-0 bg-white z-10">
                                        <tr>
                                            <th class="w-10">Edge ID</th>
                                            <th>Source</th>
                                            <th>Target</th>
                                            <th class="w-10">Weight</th>
                                        </tr>
                                    </thead>
    
                                    <tbody>
                                        <template x-for="row in rows" :key="row.id">
                                            <tr 
                                                x-data="pathRowTableComponent">
                                                <td x-text="row.id" class="w-10"></td>
                                                <td>
                                                    <select 
                                                        @input="handleChange()"
                                                        x-model="selectedSource"
                                                        class="select select-ghost focus:outline-none focus:border-none focus:bg-transparent">
                                                        <template x-for="(target, index) in $store.nodes.nodes" :key="target.id">
                                                            <option x-text="target.name"  :value="target.name"></option>
                                                        </template>
                                                    </select>
                                                </td>
                                                <td>
                                                    <select 
                                                        @input="handleChange()"
                                                        x-model="selectedTarget"
                                                        class="select select-ghost focus:outline-none focus:border-none focus:bg-transparent">
                                                        <template x-for="target in $store.nodes.nodes.filter(n => n.name !== selectedSource )" :key="target.id">
                                                            <option x-text="target.name" :value="target.name"></option>
                                                        </template>
                                                    </select>
                                                </td>
                                                <td class="w-10">
                                                    <input 
                                                        x-model.number="weight"
                                                        @input="handleChange()"
                                                        type="number"
                                                        min="0"
                                                        class="input input-ghost focus:outline-none focus:border-none focus:ring-0 focus:bg-transparent"
                                                        value="0">
                                                </td>
                                            </tr>
                                        </template>
                                    </tbody>
                                </table>

                                <div 
                                    class="w-full">
                                    <button 
                                        class="btn btn-xs btn-outline w-full"
                                        @click="addRow()">
                                        + Add Row
                                    </button>
                                </div>
                            </div>

                            <div class="mt-4">
                                <button 
                                    @click="createGraph()"
                                    type="button" 
                                    class="btn btn-neutral w-full btn-sm">
                                    Create Graph
                                </button>
                            </div>
                        </div>
                    </div>
                    
                    <div class="card-actions justify-center mt-auto">
                        <button
                            x-show="!isFinishRun"
                            @click="console.log('clicked')"
                            type="button"
                            class="btn btn-neutral w-full btn-sm">
                            Run
                        </button>

                        <button
                            x-show="isFinishRun"
                            @click="console.log('clicked')"
                            type="button"
                            class="btn btn-outline w-full btn-sm">
                            Reset
                        </button>
                    </div>
                </div>
            </div>
        </section>

        <div class="h-full">
            <svg id="graph-svg" width="100%" height="100%"></svg>
        </div>

        <script src="assets/states.js"></script>
        <script src="assets/components.js"></script>
    </main>
</body>

</html>
