<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Greedy Best First Search Demo</title>
    <link rel="shortcut icon" href="assets/favicon.ico" type="image/x-icon">
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3.14.8/dist/cdn.min.js"></script>
</head>

<body class="bg-gray-100 py-5 px-12 min-h-screen">
    <nav class="fixed top-0 py-5 px-2">
        <h1 class="font-bold text-2xl">Greedy Best First Search Demo</h1>
    </nav>

    <main class="mt-14 relative p-12 pb-20 h-screen min-h-screen">
        <section class="z-10 top-24 left-28 fixed bg-white">
            <button type="button"
                class="bg-black text-white px-4 py-2 w-36 rounded cursor-pointer transition duration-200 ease-in-out transform hover:bg-gray-800 focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-gray-600 active:scale-95">
                Run
            </button>
        </section>

        <div class="h-full">
            <svg width="100%" height="100%"></svg>
        </div>

        <script src="https://cdn.jsdelivr.net/npm/d3@7"></script>
        <script type="module">
            const nodes = [
                { id: "A" },
                { id: "B" },
                { id: "C" },
                { id: "D" }
            ];

            const links = [
                { source: "A", target: "B", cost: 1 },
                { source: "A", target: "C", cost: 2 },
                { source: "B", target: "D", cost: 4 },
                { source: "C", target: "D", cost: 3 },
            ];

            const svg = d3.select("svg");
            
            const width = window.innerWidth, height = window.innerHeight;
            const simulation = d3.forceSimulation(nodes)
                .force("link", d3.forceLink(links).id(d => d.id).distance(100))
                .force("charge", d3.forceManyBody().strength(-300))
                .force("center", d3.forceCenter(width / 2, height / 2));

            const node = svg.append("g")
                .selectAll("g")
                .data(nodes)
                .join("g")
                .attr("class", "node");

            node.append("circle")
                .attr("r", 20)
                .attr("fill", "#69b3a2");

            node.append("text")
                .attr("text-anchor", "middle")
                .attr("y", 5)
                .text(d => `${d.id}`);

            const link = svg.append("g")
                .attr("stroke", "#999")
                .attr("stroke-opacity", 0.6)
                .selectAll("line")
                .data(links)
                .join("line")
                .attr("stroke-width", d => Math.sqrt(d.cost));

            simulation.on("tick", () => {
                link
                    .attr("x1", d => d.source.x)
                    .attr("y1", d => d.source.y)
                    .attr("x2", d => d.target.x)
                    .attr("y2", d => d.target.y);

                node.attr("transform", d => `translate(${d.x},${d.y})`);
            });
        </script>
    </main>
</body>

</html>
