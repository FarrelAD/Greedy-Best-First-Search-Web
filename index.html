<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Greedy Best First Search Demo</title>
    <link rel="shortcut icon" href="assets/favicon.ico" type="image/x-icon">
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3.14.8/dist/cdn.min.js"></script>
</head>

<body class="bg-gray-100 py-5 px-12 min-h-screen">
    <nav class="fixed top-0 py-5 px-2">
        <h1 class="font-bold text-2xl">Greedy Best First Search Demo</h1>
    </nav>

    <main class="mt-14 relative">
        <div id="node-tree-content" class="flex flex-col items-center justify-center">
            <div
                x-data=""
                @click="console.log('Node '+$el.textContent.trim()+' clicked!')"
                class="relative p-3 border border-b-2 leading-10 border-black w-24 h-24 rounded text-center shadow-[2px_5px_0px_black]">
                A
            </div>
        
            <div class="flex items-center justify-center my-5 relative">
                <input 
                    type="number" 
                    name="1" 
                    min="0"
                    value="0"
                    class="w-6 h-6 appearance-none bg-transparent text-center absolute top-1/2 -translate-y-1/2 -left-5 focus:outline-none"
                    style="-moz-appearance: textfield; appearance: textfield;">
                
                <svg 
                    xmlns="http://www.w3.org/2000/svg" 
                    fill="none" 
                    viewBox="0 0 24 24" 
                    stroke-width="2.5"
                    stroke="currentColor"
                    class="size-6 scale-y-150">
                    <path stroke-linecap="round" stroke-linejoin="round" d="M15.75 17.25 12 21m0 0-3.75-3.75M12 21V3" />
                </svg>
            </div>
        
            <div
                x-data=""
                @click="console.log('Node '+$el.textContent.trim()+' clicked!')"
                class="relative p-3 border border-b-2 leading-10 border-black w-24 h-24 rounded text-center shadow-[2px_5px_0px_black]">
                B
            </div>
        </div>
        
    
    </main>
</body>

</html>
