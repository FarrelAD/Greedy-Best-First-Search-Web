<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Greedy Best First Search Demo</title>
    <link rel="shortcut icon" href="assets/favicon.ico" type="image/x-icon">
    <link href="https://cdn.jsdelivr.net/npm/daisyui@5" rel="stylesheet" type="text/css" />
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <style>
        input[type="number"]::-webkit-outer-spin-button,
        input[type="number"]::-webkit-inner-spin-button {
          -webkit-appearance: none;
          margin: 0;
        }
    
        input[type="number"] {
          -moz-appearance: textfield;
        }
    </style>
    <script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3.14.8/dist/cdn.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/d3@7"></script>
</head>

<body class="py-5 px-12 min-h-screen">
    <nav class="navbar fixed top-0">
        <div class="navbar-start">
            <h1 class="text-2xl font-bold">Greedy Best First Search Demo</h1>
        </div>
    </nav>

    <main 
        x-ref="main"
        x-data="mainComponent"
        class="mt-14 relative p-12 pb-20 h-screen min-h-screen">
        <section class="fixed z-10 top-1/2 -translate-y-1/2 left-5">
            <div
                x-data="controllerComponent"
                class="card card-md card-border bg-white shadow-lg h-[30rem] w-96">
                <div class="card-body">
                    <div class="card-title font-bold">Controller</div>

                    <hr>

                    <div class="my-4">
                        <label class="floating-label">
                            <input 
                                x-init="$store.nodes.updateNode($el.value)"
                                @input="$store.nodes.updateNode($el.value)"
                                type="number" 
                                class="input input-neutral input-sm validator" 
                                required 
                                placeholder="Total node" 
                                min="2" 
                                value="2"
                                title="Total node">
                            <p class="validator-hint text-xs">The minimum of total node is 2</p>
                            <span>Total node</span>
                        </label>

                        <div class="overflow-y-auto max-h-52">
                            <table
                                class="table table-zebra">
                                <thead class="sticky top-0 bg-white z-10">
                                    <tr>
                                        <th>No</th>
                                        <th>Node</th>
                                    </tr>
                                </thead>
                                <tbody>
                                    <template x-for="(val, index) in $store.nodes.nodes" :key="index">
                                        <tr>
                                            <td x-text="index + 1"></td>
                                            <td>
                                                <input 
                                                    @input="$store.nodes.updateNodeProperty(index, $el.value)"
                                                    type="text" 
                                                    class="input input-ghost focus:outline-none focus:border-none focus:ring-0 focus:bg-transparent" 
                                                    placeholder="Name">
                                            </td>
                                        </tr>
                                    </template>
                                </tbody>
                            </table>
                        </div>
                    </div>
                    
                    <div class="card-actions justify-center mt-auto">
                        <button 
                            @click="createGraph()"
                            type="button"
                            :disabled="isGraphCreated"
                            class="btn btn-neutral w-full btn-sm">
                            Create Graph
                        </button>

                        <button
                            x-show="!isFinishRun"
                            @click="console.log('clicked')"
                            type="button"
                            class="btn btn-neutral w-full btn-sm">
                            Run
                        </button>

                        <button
                            x-show="isFinishRun"
                            @click="console.log('clicked')"
                            type="button"
                            class="btn btn-outline w-full btn-sm">
                            Reset
                        </button>
                    </div>
                </div>
            </div>
        </section>

        <div class="h-full">
            <svg id="graph-svg" width="100%" height="100%"></svg>
        </div>

        <aside 
            x-data="tooltipComponent"
            x-ref="nodeTooltip"
            x-show="isShow"
            @mouseenter="clearTimeout(timeoutID); isShow = true;" 
            @mouseleave="isShow = false"
            x-transition
            id="node-tooltip"
            class="absolute">
            <div
                class="card card-border card-xs bg-slate-200 shadow-sm z-30">
                <div class="card-body">
                    <div
                        class="card-actions flex-col">
                        <button 
                            @click="setNode('start')"
                            id="start-btn-node"
                            class="btn btn-xs btn-primary w-full">
                            Set as start node
                        </button>
                        <button 
                            @click="setNode('end')"
                            id="end-btn-node"
                            class="btn btn-xs btn-secondary w-full">
                            Set as end node
                        </button>
                    </div>
                </div>
            </div>
        </aside>

        <script src="assets/states.js"></script>
        <script src="assets/components.js"></script>
    </main>
</body>

</html>
