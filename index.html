<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Greedy Best First Search Demo</title>
    <link rel="shortcut icon" href="assets/favicon.ico" type="image/x-icon">
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3.14.8/dist/cdn.min.js"></script>
</head>

<body class="bg-gray-100 py-5 px-12 min-h-screen">
    <nav class="fixed top-0 py-5 px-2">
        <h1 class="font-bold text-2xl">Greedy Best First Search Demo</h1>
    </nav>

    <main class="mt-14 relative">
        <section class="absolute z-10 top-10 left-10">
            <button 
                type="button"
                class="bg-black text-white px-4 py-2 w-36 rounded cursor-pointer transition duration-200 ease-in-out transform hover:bg-gray-800 focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-gray-600 active:scale-95">
                Run
            </button>
        </section>
        
        <div 
            x-data="{
                leftChild: false,
                rightChild: false,
                lastRow: 1,
                createNewNode(currentRow, side) {
                    const totalRow = document.querySelectorAll('.row').length;

                    if (totalRow != currentRow) return;

                    const newRow = document.createElement('div');
                    newRow.setAttribute('x-data', `{ currentRow: ${currentRow + 1} }`);
                    newRow.setAttribute('class', 'row my-5 mt-24');

                    const template = document.getElementById('node-template');
                    const clonedTemplate = template.content.cloneNode(true);
                    newRow.appendChild(clonedTemplate);
                    
                    $el.appendChild(newRow);
                }
            }"
            id="node-tree-content" 
            class="flex flex-col items-center justify-center">
            <div
                x-data="{
                    currentRow: 1
                }"
                class="row my-5">
                <div
                    x-data="{
                        isHover: false,
                        timeoutId: null
                    }"
                    @click="console.log('Node a clicked!')"
                    @mouseenter="isHover = true; clearTimeout(timeoutId)"
                    @mouseleave="timeoutId = setTimeout(() => isHover = false, 1000)"
                    class="relative p-3 border border-b-2 leading-10 border-black w-24 h-24 rounded text-center font-bold shadow-[2px_5px_0px_black] transition duration-200 ease-in-out transform cursor-pointer select-none">
                    A
    
                    <div
                        x-show="isHover"
                        x-transition
                        @click="createNewNode(currentRow, 'left')"
                        class="absolute -left-28 -bottom-32 p-3 border border-b-2 leading-10 text-gray-600 font-bold bg-gray-200 border-gray-600 w-24 h-24 rounded text-center shadow-[2px_5px_0px_#525252] transition duration-200 ease-in-out transform cursor-pointer select-none hover:bg-gray-300 active:shadow-none active:translate-y-[5px] focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-gray-600">
                        Left
                    </div>

                    <div
                        x-show="isHover"
                        x-transition
                        @click="createNewNode(currentRow, 'right')"
                        class="absolute -right-28 -bottom-32 p-3 border border-b-2 leading-10 text-gray-600 font-bold bg-gray-200 border-gray-600 w-24 h-24 rounded text-center shadow-[2px_5px_0px_#525252] transition duration-200 ease-in-out transform cursor-pointer select-none hover:bg-gray-300 active:shadow-none active:translate-y-[5px] focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-gray-600">
                        Right
                    </div>
                </div>
            </div>

            
            <template id="node-template">
                <div
                    x-data="{ isHover: false, timeoutId: null }"
                    @click="console.log('Node a clicked!')"
                    @mouseenter="isHover = true; clearTimeout(timeoutId)"
                    @mouseleave="timeoutId = setTimeout(() => isHover = false, 1000)"
                    class="relative p-3 border border-b-2 leading-10 border-black w-24 h-24 rounded text-center font-bold shadow-[2px_5px_0px_black] transition duration-200 ease-in-out transform cursor-pointer select-none">
                    A
                    <div
                        x-show="isHover"
                        x-transition
                        @click="createNewNode(currentRow, 'left')"
                        class="absolute -left-28 -bottom-32 p-3 border border-b-2 leading-10 text-gray-600 font-bold bg-gray-200 border-gray-600 w-24 h-24 rounded text-center shadow-[2px_5px_0px_#525252] transition duration-200 ease-in-out transform cursor-pointer select-none hover:bg-gray-300 active:shadow-none active:translate-y-[5px] focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-gray-600">
                        Left
                    </div>
                    <div
                        x-show="isHover"
                        x-transition
                        @click="createNewNode(currentRow, 'right')"
                        class="absolute -right-28 -bottom-32 p-3 border border-b-2 leading-10 text-gray-600 font-bold bg-gray-200 border-gray-600 w-24 h-24 rounded text-center shadow-[2px_5px_0px_#525252] transition duration-200 ease-in-out transform cursor-pointer select-none hover:bg-gray-300 active:shadow-none active:translate-y-[5px] focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-gray-600">
                        Right
                    </div>
                </div>
            </template>
        </div>
    </main>
</body>

</html>
