<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Greedy Best First Search Demo</title>
    <link rel="shortcut icon" href="assets/favicon.ico" type="image/x-icon">
    <link href="https://cdn.jsdelivr.net/npm/daisyui@5" rel="stylesheet" type="text/css" />
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <style>
        input[type="number"]::-webkit-outer-spin-button,
        input[type="number"]::-webkit-inner-spin-button {
          -webkit-appearance: none;
          margin: 0;
        }
    
        input[type="number"] {
          -moz-appearance: textfield;
        }
    </style>
    <script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3.14.8/dist/cdn.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/d3@7"></script>
</head>

<body>
    <nav class="navbar fixed top-0">
        <h1 class="text-xl font-bold text-center w-full">Greedy Best First Search Demo</h1>
    </nav>

    <main 
        x-ref="main"
        x-data="mainComponent"
        class="relative p-12 pb-20 h-screen min-h-screen">
        <section class="fixed z-10 top-1/2 -translate-y-1/2 left-5">
            <div
                x-data="controllerComponent"
                class="card card-md border border-black bg-white shadow-md shadow-slate-500 h-4/5 w-52">
                <div class="card-body">
                    <div class="card-title font-bold">Controller</div>

                    <hr>

                    <div class="mt-4">
                        <label class="floating-label">
                            <input 
                                x-init="$store.nodes.updateNode($el.value)"
                                @input="$store.nodes.updateNode($el.value)"
                                type="number" 
                                class="input input-neutral input-sm validator" 
                                required 
                                placeholder="Total node" 
                                min="2" 
                                value="2"
                                title="Total node">
                            <p class="validator-hint text-xs">The minimum of total node is 2</p>
                            <span>Total node</span>
                        </label>

                        <div class="overflow-y-auto h-1/2 max-h-64">
                            <table
                                class="table table-zebra">
                                <thead class="sticky top-0 bg-white z-10">
                                    <tr>
                                        <th>No</th>
                                        <th>Node</th>
                                    </tr>
                                </thead>
                                <tbody>
                                    <template x-for="(val, index) in $store.nodes.nodesData" :key="index">
                                        <tr>
                                            <td x-text="index + 1"></td>
                                            <td>
                                                <input 
                                                    @input="$store.nodes.updateNodeProperty(index, $el.value)"
                                                    type="text" 
                                                    class="input input-ghost focus:outline-none focus:border-none focus:ring-0 focus:bg-transparent" 
                                                    placeholder="Name">
                                            </td>
                                        </tr>
                                    </template>
                                </tbody>
                            </table>
                        </div>
                    </div>
                    
                    <div class="card-actions justify-center mt-auto">
                        <button 
                            @click="createGraph(); isGraphCreated = true"
                            type="button"
                            :disabled="isGraphCreated"
                            class="btn btn-neutral w-full btn-sm">
                            Create Graph
                        </button>

                        <button
                            x-show="!isFinishRun"
                            @click="runGreedyBestFirstSearch(); isFinishRun = true"
                            :disabled="!isGraphCreated"
                            type="button"
                            class="btn btn-neutral w-full btn-sm">
                            Run
                        </button>

                        <button
                            x-show="isFinishRun"
                            @click="runGreedyBestFirstSearch(true); isFinishRun = true"
                            type="button"
                            class="btn btn-outline w-full btn-sm">
                            Re-run
                        </button>

                        <button
                            @click="resetData(); resetMainComponent();"
                            :disabled="!isGraphCreated && !isFinishRun"
                            type="button"
                            class="btn btn-neutral w-full btn-sm">
                            Reset
                        </button>
                    </div>
                </div>
            </div>
        </section>

        <div class="h-full flex justify-end">
            <svg id="graph-svg" class="w-4/5 h-full"></svg>
        </div>

        <section class="fixed bottom-6 left-1/2 -translate-x-1/2 w-1/2">
            <div
                x-data="" 
                class="card border border-black w-full shadow-md shadow-slate-500">
                <div class="card-body flex-row p-4">
                    <div class="w-1/2 flex flex-col justify-center mr-4">
                        <div class="card-title font-bold text-center block text-sm">Path</div>
                        <div id="paths-result" class="flex flex-wrap text-lg justify-center">
                            <template x-if="$store.links.paths.length == 0">
                                <div class="font-bold text-xl">-</div>
                            </template>

                            <template x-if="$store.links.paths.length != 0">
                                <template x-for="(path, index) in $store.links.paths">
                                    <div class="flex items-center">
                                        <div x-text="path" class="mx-2"></div>
                                        <template x-if="index != $store.links.paths.length - 1">
                                            <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor" class="size-6">
                                                <path stroke-linecap="round" stroke-linejoin="round" d="M17.25 8.25 21 12m0 0-3.75 3.75M21 12H3" />
                                            </svg>                                          
                                        </template>
                                    </div>
                                </template>
                            </template>
                        </div>
                    </div>

                    <div class="border-l-2 border-black h-full"></div>

                    <div class="w-1/2 flex flex-col justify-center ml-4">
                        <div class="card-title font-bold text-center block text-sm">Total Cost</div>
                        <div id="cost-result" class="flex flex-wrap text-lg justify-center">
                            <template x-if="$store.links.costs.length == 0">
                                <div class="font-bold text-xl">-</div>
                            </template>

                            <template x-if="$store.links.costs.length != 0">
                                <template x-for="(cost, index) in $store.links.costs">
                                    <div class="flex items-center">
                                        <div x-text="cost" class="mx-2"></div>
                                        <template x-if="index != $store.links.costs.length - 1">
                                            <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor" class="size-4">
                                                <path stroke-linecap="round" stroke-linejoin="round" d="M12 4.5v15m7.5-7.5h-15" />
                                            </svg>
                                        </template>

                                        <template x-if="index == $store.links.costs.length - 1">
                                            <div class="flex items-center">
                                                <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor" class="size-4">
                                                    <path stroke-linecap="round" stroke-linejoin="round" d="M4.499 8.248h15m-15 7.501h15" />
                                                </svg>

                                                <div x-text="$store.links.costs.reduce((acc, val) => acc + val, 0)" class="ml-2"></div>
                                            </div>
                                        </template>
                                    </div>
                                </template>
                            </template>
                        </div>
                    </div>
                </div>
            </div>
        </section>

        <aside 
            x-data="tooltipComponent"
            x-ref="nodeTooltip"
            x-show="isShow"
            @mouseenter="clearTimeout(timeoutID); isShow = true;" 
            @mouseleave="isShow = false"
            x-transition
            id="node-tooltip"
            class="absolute">
            <div
                class="card border border-black card-xs bg-white shadow-md shadow-slate-500 z-30">
                <div class="card-body">
                    <div
                        class="card-actions flex-col">
                        <button 
                            @click="setNode('start')"
                            id="start-btn-node"
                            class="btn btn-xs btn-neutral w-full">
                            Set as start node
                        </button>
                        <button 
                            @click="setNode('end')"
                            id="end-btn-node"
                            class="btn btn-xs btn-neutral w-full">
                            Set as end node
                        </button>
                    </div>
                </div>
            </div>
        </aside>

        <script src="assets/states.js"></script>
        <script src="assets/components.js"></script>
    </main>
</body>

</html>
